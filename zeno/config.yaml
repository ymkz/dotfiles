snippets:
  - name: git initial empty commit
    keyword: gini
    snippet: "git init && git commit --allow-empty -m 'chore: initial empty commit'"
  - name: git status
    keyword: gs
    snippet: git status --short --branch
  - name: git create new branch and switch
    keyword: gnew
    snippet: 'git switch -c '
  - name: git add
    keyword: ga
    snippet: 'git add '
  - name: git commit message generated by llm
    keyword: gc
    snippet: git commit -m "$(pi --print 'Generate ONLY a one-line Git commit message, using imperative mood, summarizing what was changed and why, based strictly on the contents of `git diff --cached`. DO NOT add an explanation or a body. Output ONLY the commit summary line.')" -e
  - name: git commit message
    keyword: gcm
    snippet: "git commit -m '{{commit_message}}'"
  - name: git commit amend
    keyword: gam
    snippet: git commit --amend -C HEAD
  - name: git commit fix
    keyword: gcf
    snippet: "git commit --amend -m '{{commit_message}}'"
  - name: git push
    keyword: gps
    snippet: git push
  - name: git pull
    keyword: gpl
    snippet: git pull
  - name: git log recent
    keyword: gl
    snippet: "git log -n 10 --date=short --pretty=format:'%C(yellow)%h %C(green)%cd %C(blue)%cn %C(reset)%s'"
  - name: git log all
    keyword: gll
    snippet: "git log --date=short --pretty=format:'%C(yellow)%h %C(green)%cd %C(blue)%cn %C(reset)%s'"
  - name: git branch
    keyword: gb
    snippet: git branch
  - name: git branch verbose
    keyword: gbl
    snippet: git branch -a -vv
  - name: git diff
    keyword: gd
    snippet: git diff
  - name: git diff cached
    keyword: gdc
    snippet: git diff --cached
  - name: git diff color words
    keyword: gdw
    snippet: git diff --color-words
  - name: git diff color words regex
    keyword: gds
    snippet: "git diff --color-words --word-diff-regex='\\w+|[^[:space:]]'"
  - name: git restore
    keyword: grs
    snippet: 'git restore '
  - name: git unstage
    keyword: gun
    snippet: 'git restore --staged '
  - name: git prune gone branches
    keyword: gg
    snippet: "git fetch --all --prune; git branch -vv | awk '/: gone]/{print $1}' | xargs git branch -D"
  - name: npm global packages
    keyword: ngp
    snippet: npm ls --location=global --depth=0
  - name: npm project dependencies
    keyword: deps
    snippet: "jq -r '.dependencies | keys[]?' package.json | tr '\\n' ' '"
  - name: npm project devDependencies
    keyword: devdeps
    snippet: "jq -r '.devDependencies | keys[]?' package.json | tr '\\n' ' '"
